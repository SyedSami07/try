<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flex 2</title>

    <style>
      .nav {
        display: flex;
        
      }

      .nav div{
        flex: 1;
      }

    </style>
  </head>

  <body>
    <div class="nav">
      <div class="logo">Logo</div>
      <div class="menu">Menu</div>
      <div class="login">Login</div>
    </div>
  </body>
</html>
